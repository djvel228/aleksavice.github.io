  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; min-height: 100vh; background: linear-gradient(160deg, #ffb3cc 0%, #ffd6e7 30%, #ffe8f0 55%, #fff0f5 100%); position: relative; overflow-x: hidden; }
  .global-hearts { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .gh { position: absolute; animation: floatH 7s ease-in-out infinite; opacity: 0.22; }
  .gh:nth-child(1)  { top: 3%;  left: 2%;   font-size: 52px; animation-delay: 0s; }
  .gh:nth-child(2)  { top: 18%; left: 6%;   font-size: 36px; animation-delay: 1.5s; }
  .gh:nth-child(3)  { top: 35%; left: 1%;   font-size: 44px; animation-delay: 3s; }
  .gh:nth-child(4)  { top: 55%; left: 7%;   font-size: 28px; animation-delay: 0.8s; }
  .gh:nth-child(5)  { top: 72%; left: 3%;   font-size: 48px; animation-delay: 2.2s; }
  .gh:nth-child(6)  { top: 88%; left: 8%;   font-size: 32px; animation-delay: 4s; }
  .gh:nth-child(7)  { top: 6%;  right: 3%;  font-size: 44px; animation-delay: 0.5s; }
  .gh:nth-child(8)  { top: 22%; right: 7%;  font-size: 56px; animation-delay: 2s; }
  .gh:nth-child(9)  { top: 40%; right: 2%;  font-size: 32px; animation-delay: 3.5s; }
  .gh:nth-child(10) { top: 60%; right: 8%;  font-size: 48px; animation-delay: 1.2s; }

  .gh:nth-child(12) { top: 92%; right: 9%;  font-size: 42px; animation-delay: 0.3s; }
  @keyframes floatH { 0%, 100% { transform: translateY(0) scale(1) rotate(-6deg); } 50% { transform: translateY(-20px) scale(1.12) rotate(6deg); } }
  @media (max-width: 600px) { .gh { display: none; } }

  .hero-bg { width: 100%; height: 280px; background: transparent; position: relative; flex-shrink: 0; }
  .hero-bg::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 80px; background: linear-gradient(to bottom, transparent, #fff5f8); }
  .hearts { position: absolute; top: 0; left: 0; right: 0; bottom: 0; overflow: hidden; pointer-events: none; }
  .heart { position: absolute; animation: floatH 5s ease-in-out infinite; }

  .heart:nth-child(3) { top: 48%; left: 15%; font-size: 30px; animation-delay: 1.6s; opacity: 0.5; }
  .heart:nth-child(4) { top: 12%; left: 42%; font-size: 54px; animation-delay: 2.4s; opacity: 0.38; }
  .heart:nth-child(5) { top: 58%; left: 72%; font-size: 40px; animation-delay: 1.2s; opacity: 0.48; }
  .heart:nth-child(6) { top: 32%; left: 82%; font-size: 26px; animation-delay: 3s;   opacity: 0.42; }
  .heart:nth-child(7) { top: 70%; left: 38%; font-size: 44px; animation-delay: 0.4s; opacity: 0.38; }
  .heart:nth-child(8) { top: 5%;  left: 82%; font-size: 32px; animation-delay: 2s;   opacity: 0.52; }
  .content-wrap { width: 100%; background: #fff5f8; display: flex; flex-direction: column; align-items: center; flex: 1; }
  .avatar-wrap { position: relative; margin-top: -90px; z-index: 10; }
  .avatar-ring { width: 160px; height: 160px; border-radius: 50%; background: linear-gradient(135deg, #ff80aa, #ffb3cc, #ffffff); padding: 4px; animation: pulse-ring 3s ease-in-out infinite; }
  @keyframes pulse-ring { 0%, 100% { box-shadow: 0 0 0 0 rgba(255,128,170,0.4); } 50% { box-shadow: 0 0 0 12px rgba(255,128,170,0); } }
  .avatar-inner { width: 100%; height: 100%; border-radius: 50%; overflow: hidden; }
  .avatar-inner img { width: 100%; height: 100%; object-fit: cover; object-position: center 15%; border-radius: 50%; }
  .content { display: flex; flex-direction: column; align-items: center; padding: 24px 32px 40px; width: 100%; }
  .badge { display: flex; align-items: center; background: rgba(255,128,170,0.12); border: 1px solid rgba(255,128,170,0.3); border-radius: 20px; padding: 6px 18px; margin-bottom: 12px; margin-top: 20px; animation: badgeBlink 1.8s ease-in-out infinite; }
  @keyframes badgeBlink { 0%, 100% { opacity: 1; background: rgba(255,128,170,0.12); } 50% { opacity: 0.5; background: rgba(255,128,170,0.25); } }
  .badge-text { font-size: 11px; font-weight: 500; color: #ff80aa; letter-spacing: 0.08em; text-transform: uppercase; }
  .name { font-family: 'Lora', serif; font-style: italic; font-weight: 700; font-size: 40px; color: #3a1a2a; text-align: center; line-height: 1.15; margin-bottom: 6px; }
  .name span { color: #ff80aa; }
  .subtitle { font-size: 13px; font-weight: 300; color: rgba(58,26,42,0.5); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 28px; }
  .divider { width: 40px; height: 1px; background: linear-gradient(90deg, transparent, #ff80aa, transparent); margin-bottom: 28px; }
  .stats { display: flex; gap: 32px; margin-bottom: 32px; }
  .stat { text-align: center; }
  .stat-num { font-family: 'Lora', serif; font-style: italic; font-size: 22px; font-weight: 700; color: #ff80aa; }
  .stat-label { font-size: 10px; color: rgba(58,26,42,0.4); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 2px; }
  .btn-main { width: 100%; padding: 18px; border: none; border-radius: 16px; color: #fff; font-family: 'DM Sans', sans-serif; font-size: 17px; font-weight: 600; letter-spacing: 0.04em; cursor: pointer; text-decoration: none; display: block; text-align: center; margin-bottom: 12px; transition: transform 0.15s, box-shadow 0.15s; position: relative; overflow: hidden; }
  .btn-main::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); transition: left 0.4s; }
  .btn-main:hover::before { left: 100%; }
  .btn-main:hover { transform: translateY(-2px); }
  .btn-onlyfans { background: linear-gradient(135deg, #2196f3, #64b5f6); box-shadow: 0 8px 32px rgba(33,150,243,0.35); }
  .btn-onlyfans:hover { box-shadow: 0 12px 40px rgba(33,150,243,0.5); }
  .btn-fansly { background: linear-gradient(135deg, #ff3d7f, #ff80aa); box-shadow: 0 8px 32px rgba(255,61,127,0.4); }
  .btn-fansly:hover { box-shadow: 0 12px 40px rgba(255,61,127,0.6); }
  .btn-telegram { background: linear-gradient(135deg, #ff80aa, #ffb3cc); box-shadow: 0 8px 32px rgba(255,128,170,0.35); }
